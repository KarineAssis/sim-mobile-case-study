<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="760" viewBox="0 0 1400 760" role="img" aria-labelledby="title desc">
  <title id="title">Comparação do processo antes e depois do SIM Mobile</title>
  <desc id="desc">À esquerda, o processo anterior dependente de computadores fixos. À direita, o processo com acesso mobile e registro mais próximo do ponto de execução.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#071522"/>
      <stop offset="1" stop-color="#0d2436"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#000000" flood-opacity="0.24"/>
    </filter>
    <marker id="arrow-muted" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 z" fill="#72879a"/>
    </marker>
    <marker id="arrow-accent" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 z" fill="#d18a3f"/>
    </marker>
  </defs>

  <rect width="1400" height="760" rx="28" fill="url(#bg)"/>
  <text x="70" y="74" fill="#f4f7fa" font-family="Arial, Helvetica, sans-serif" font-size="34" font-weight="700">PROCESSO ANTES E DEPOIS</text>
  <text x="70" y="110" fill="#9fb0bf" font-family="Arial, Helvetica, sans-serif" font-size="18">A mudança central foi aproximar a captura de dados do ponto de execução.</text>

  <line x1="700" y1="145" x2="700" y2="665" stroke="#31475a" stroke-width="2"/>

  <text x="70" y="178" fill="#9fb0bf" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="700">ANTES</text>
  <text x="760" y="178" fill="#d18a3f" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="700">COM SIM MOBILE</text>

  <!-- Left lane -->
  <g filter="url(#shadow)">
    <rect x="70" y="220" width="210" height="108" rx="18" fill="#112b3d" stroke="#29475c"/>
    <rect x="315" y="220" width="210" height="108" rx="18" fill="#112b3d" stroke="#29475c"/>
    <rect x="70" y="395" width="210" height="108" rx="18" fill="#112b3d" stroke="#29475c"/>
    <rect x="315" y="395" width="210" height="108" rx="18" fill="#112b3d" stroke="#29475c"/>
    <rect x="192" y="570" width="210" height="108" rx="18" fill="#112b3d" stroke="#29475c"/>
  </g>

  <text x="175" y="258" text-anchor="middle" fill="#f4f7fa" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="700">MÁQUINA</text>
  <text x="175" y="287" text-anchor="middle" fill="#aebcc8" font-family="Arial, Helvetica, sans-serif" font-size="16">Necessidade identificada</text>

  <text x="420" y="258" text-anchor="middle" fill="#f4f7fa" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="700">DESLOCAMENTO</text>
  <text x="420" y="287" text-anchor="middle" fill="#aebcc8" font-family="Arial, Helvetica, sans-serif" font-size="16">Saída do ponto de trabalho</text>

  <text x="175" y="433" text-anchor="middle" fill="#f4f7fa" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="700">ESPERA</text>
  <text x="175" y="462" text-anchor="middle" fill="#aebcc8" font-family="Arial, Helvetica, sans-serif" font-size="16">Computador disponível</text>

  <text x="420" y="433" text-anchor="middle" fill="#f4f7fa" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="700">DESKTOP</text>
  <text x="420" y="462" text-anchor="middle" fill="#aebcc8" font-family="Arial, Helvetica, sans-serif" font-size="16">Consulta e atualização</text>

  <text x="297" y="608" text-anchor="middle" fill="#f4f7fa" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="700">REGISTRO POSTERIOR</text>
  <text x="297" y="637" text-anchor="middle" fill="#aebcc8" font-family="Arial, Helvetica, sans-serif" font-size="16">Dado distante da execução</text>

  <path d="M280 274 H303" stroke="#72879a" stroke-width="4" marker-end="url(#arrow-muted)"/>
  <path d="M420 328 V370 H175 V383" fill="none" stroke="#72879a" stroke-width="4" marker-end="url(#arrow-muted)"/>
  <path d="M280 449 H303" stroke="#72879a" stroke-width="4" marker-end="url(#arrow-muted)"/>
  <path d="M420 503 V545 H297 V558" fill="none" stroke="#72879a" stroke-width="4" marker-end="url(#arrow-muted)"/>

  <!-- Right lane -->
  <g filter="url(#shadow)">
    <rect x="760" y="220" width="240" height="108" rx="18" fill="#122f42" stroke="#8e5c2b"/>
    <rect x="1070" y="220" width="240" height="108" rx="18" fill="#122f42" stroke="#8e5c2b"/>
    <rect x="760" y="430" width="240" height="108" rx="18" fill="#122f42" stroke="#8e5c2b"/>
    <rect x="1070" y="430" width="240" height="108" rx="18" fill="#122f42" stroke="#8e5c2b"/>
  </g>

  <text x="880" y="258" text-anchor="middle" fill="#f4f7fa" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="700">MÁQUINA</text>
  <text x="880" y="287" text-anchor="middle" fill="#c5d0d9" font-family="Arial, Helvetica, sans-serif" font-size="16">Necessidade identificada</text>

  <text x="1190" y="258" text-anchor="middle" fill="#f4f7fa" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="700">ACESSO MOBILE</text>
  <text x="1190" y="287" text-anchor="middle" fill="#c5d0d9" font-family="Arial, Helvetica, sans-serif" font-size="16">Fluxo disponível em campo</text>

  <text x="880" y="468" text-anchor="middle" fill="#f4f7fa" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="700">REGISTRO NO LOCAL</text>
  <text x="880" y="497" text-anchor="middle" fill="#c5d0d9" font-family="Arial, Helvetica, sans-serif" font-size="16">Mais próximo da atividade</text>

  <text x="1190" y="468" text-anchor="middle" fill="#f4f7fa" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="700">DADOS OPERACIONAIS</text>
  <text x="1190" y="497" text-anchor="middle" fill="#c5d0d9" font-family="Arial, Helvetica, sans-serif" font-size="16">Base mais oportuna para análise</text>

  <path d="M1000 274 H1058" stroke="#d18a3f" stroke-width="4" marker-end="url(#arrow-accent)"/>
  <path d="M1190 328 V388 H880 V418" fill="none" stroke="#d18a3f" stroke-width="4" marker-end="url(#arrow-accent)"/>
  <path d="M1000 484 H1058" stroke="#d18a3f" stroke-width="4" marker-end="url(#arrow-accent)"/>

  <rect x="760" y="592" width="550" height="86" rx="18" fill="#0b1d2a" stroke="#31475a"/>
  <text x="1035" y="625" text-anchor="middle" fill="#d18a3f" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="700">MUDANÇA ESTRUTURAL</text>
  <text x="1035" y="654" text-anchor="middle" fill="#d9e2e9" font-family="Arial, Helvetica, sans-serif" font-size="17">Menos dependência de salas de apoio e maior proximidade entre execução e registro.</text>

  <text x="70" y="728" fill="#6f8495" font-family="Arial, Helvetica, sans-serif" font-size="14">SIM Mobile • Case de transformação digital em manutenção industrial</text>
</svg>